name: sonarcloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14

      - name: Python info
        shell: bash -e {0}
        run: |
          which python
          python --version

      - name: Install dependencies
        run: |
          python -m pip install pytest pytest-cov coverage python-dotenv
          python -m pip install jax numpy scipy optax matplotlib click rich
          python -m pip install .

      - name: Run unit tests with coverage
        run: python -m pytest --cov --cov-report term --cov-report xml --junitxml=xunit-result.xml tests/

      - name: Correct coverage paths
        run: sed -i "s+$PWD/++g" coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
