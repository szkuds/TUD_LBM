# TUD-LBM Complex Multiphase Simulation Configuration
#
# NOTE: Config file loading requires an adapter (coming soon).
# For now, use the Python API - see example/example_run_complex.py

[simulation]
simulation_name = 'Test complex simulation'
type = "multiphase"
grid_shape = [401, 101]
lattice_type = "D2Q9"
tau = 0.99
nt = 20000
save_interval = 2000
init_type = "wetting"

[multiphase]
kappa = 0.017
rho_l = 1.0
rho_v = 0.33
interface_width = 4
eos = "double-well"

# Force configuration - can have multiple [[force]] tables
[[force]]
type = "gravity_multiphase"
force_g = 2e-6
inclination_angle_deg = 60

[boundary_conditions]
left = "periodic"
right = "periodic"
top = "symmetry"
bottom = "wetting"

[boundary_conditions.wetting_params]
phi_left = 1.0
phi_right = 1.0
d_rho_left = 0.0
d_rho_right = 0.0
# Note: rho_l and rho_v are taken from [multiphase] section

[boundary_conditions.hysteresis_params]
ca_advancing = 90.0
ca_receding = 80.0
learning_rate = 0.05
max_iterations = 10

[output]
results_dir = "~/TUD_LBM_data/results"
# Optionally specify which fields to save
# fields = ["rho", "u", "force", "force_ext"]
